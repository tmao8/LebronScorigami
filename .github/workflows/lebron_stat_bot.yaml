name: LeBron Stat Bot

on:
  schedule:
    - cron: '*/10 0-7 * * *'
  workflow_dispatch:

jobs:
  post-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install tweepy nba-api pandas

      - name: Run LeBron Stat Bot
        env:
          TWITTER_CLIENT_ID: ${{ secrets.TWITTER_CLIENT_ID }}
          TWITTER_CLIENT_SECRET: ${{ secrets.TWITTER_CLIENT_SECRET }}
          TWITTER_REFRESH_TOKEN: ${{ secrets.TWITTER_REFRESH_TOKEN }}
          LAST_TWEET_DATE: ${{ vars.LAST_TWEET_DATE }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          PROXY_LIST: ${{ secrets.PROXY_LIST }}
        run: python3 tweet.py
